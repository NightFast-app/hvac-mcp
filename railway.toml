# Railway deployment config.
# Pushes to main trigger a rebuild; Railway injects $PORT which our server honors.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "hvac-mcp --http"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
healthcheckPath = "/mcp"
healthcheckTimeout = 30

# Required env vars (set in Railway dashboard, not committed):
#   STRIPE_SECRET       — server-side Stripe secret key
#   STRIPE_WEBHOOK_SECRET — webhook endpoint signing secret
# Optional:
#   LOG_LEVEL           — defaults to INFO
#   HVAC_MCP_HOST       — defaults to 0.0.0.0
