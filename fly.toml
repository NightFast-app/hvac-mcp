# hvac-mcp on Fly.io.
# See docs/DEPLOY_RUNBOOK.md for the end-to-end launch sequence.
#
# Key design points:
# - One machine in iad (Ashburn, VA) — closest region Fly still supports to
#   Florida (~20ms). MIA was decommissioned. If latency matters later, we
#   can add a second region but SQLite single-writer would need to become
#   Postgres first.
# - 256 MB RAM is plenty; the Python process idles around 80 MB. Scaling
#   up is a config flip.
# - auto_stop_machines = 'suspend' — Fly suspends the VM when idle and
#   resumes on request. Stripe webhook cold start is ~1s, well under
#   Stripe's 30s timeout. First MCP tool call after idle has the same
#   ~1s wake penalty. Trade-off vs paying for an always-on machine.
# - /data persistent volume holds licenses.db. Volume survives deploys
#   and machine suspension.

app = "hvac-mcp"
primary_region = "iad"

[build]
dockerfile = "Dockerfile"

[env]
HVAC_MCP_DATA_DIR = "/data"
HVAC_MCP_HOST = "0.0.0.0"
LOG_LEVEL = "INFO"

[[mounts]]
source = "hvac_mcp_data"
destination = "/data"
initial_size = "1gb"

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = "suspend"
auto_start_machines = true
min_machines_running = 0
processes = ["app"]

[http_service.concurrency]
type = "requests"
soft_limit = 25
hard_limit = 50

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
path = "/health"
timeout = "5s"

[[vm]]
size = "shared-cpu-1x"
memory = "256mb"
cpus = 1
