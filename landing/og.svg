<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#1a2b52"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4b90ff"/>
      <stop offset="1" stop-color="#6ba4ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid texture -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Wrench glyph (emoji-style) top-left -->
  <text x="84" y="128" font-size="72" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI Emoji', sans-serif">🔧</text>

  <!-- "Built by a working HVAC tech" pill -->
  <rect x="180" y="72" width="330" height="44" rx="22" fill="#4b90ff" fill-opacity="0.18" stroke="#4b90ff" stroke-opacity="0.5"/>
  <text x="345" y="101" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="20" font-weight="600" fill="#9fc0ff" text-anchor="middle">
    Built by a working HVAC tech
  </text>

  <!-- Main headline -->
  <text x="84" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="68" font-weight="700" fill="#ffffff" letter-spacing="-1.5">
    Claude &amp; ChatGPT
  </text>
  <text x="84" y="320" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="68" font-weight="700" fill="url(#accent)" letter-spacing="-1.5">
    for HVAC techs
  </text>

  <!-- Subline -->
  <text x="84" y="382" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="26" fill="#c2cbdb">
    PT charts · charge diagnosis · fault codes · code lookup · pipe + duct sizing
  </text>
  <text x="84" y="418" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="26" fill="#8a97ad">
    Right inside the chatbot you already use on your phone.
  </text>

  <!-- Monospace PT calc preview -->
  <rect x="84" y="468" width="1032" height="104" rx="12" fill="#050912" stroke="#263149"/>
  <text x="108" y="512" font-family="ui-monospace, Menlo, 'Courier New', monospace"
        font-size="24" fill="#6ba4ff" font-weight="700">
    ❯ hvac_refrigerant_charge_check
  </text>
  <text x="108" y="548" font-family="ui-monospace, Menlo, 'Courier New', monospace"
        font-size="22" fill="#c2cbdb">
    R-410A · 118 psig · 50°F  →  superheat 10.0°F · subcool 10.0°F · <tspan fill="#7fff9f">TXV in-spec</tspan>
  </text>

  <!-- Footer -->
  <text x="84" y="606" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="20" fill="#8a97ad">
    MIT · free open source · $29/mo hosted tier · 14-day refund
  </text>
</svg>
